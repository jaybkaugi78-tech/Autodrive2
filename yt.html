<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JayTube</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --surface3: #282828;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f0;
    --text2: #999;
    --text3: #555;
    --accent: #ff2d2d;
    --accent-glow: rgba(255,45,45,0.15);
    --sidebar-w: 220px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

  .sidebar {
    position: fixed; left: 0; top: 0; width: var(--sidebar-w); height: 100vh;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 200; transition: transform 0.3s ease;
    overflow-y: auto;
  }
  .sidebar.hidden { transform: translateX(-100%); }
  .logo { padding: 18px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
  .logo-mark { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-mark svg { width: 16px; height: 16px; fill: white; }
  .logo-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-name span { color: var(--accent); }

  .nav-section { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 9px 20px;
    cursor: pointer; transition: all 0.15s; color: var(--text2);
    font-size: 13.5px; position: relative;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { color: var(--text); background: var(--surface2); }
  .nav-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
  .nav-item.active svg, .nav-item:hover svg { opacity: 1; }

  .categories-nav { padding: 16px 20px; }
  .cat-title { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
  .cat-btn { padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--text2); background: transparent; border: none; text-align: left; transition: all 0.15s; font-family: 'DM Sans', sans-serif; display: block; width: 100%; }
  .cat-btn:hover { background: var(--surface2); color: var(--text); }
  .cat-btn.active { background: var(--accent-glow); color: var(--accent); }

  .topbar {
    position: fixed; top: 0; left: var(--sidebar-w); right: 0; height: 60px;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px; z-index: 100;
    transition: left 0.3s ease;
  }
  .topbar.full { left: 0; }
  .menu-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; transition: background 0.15s; flex-shrink: 0; background: transparent; border: none; color: var(--text); }
  .menu-btn:hover { background: var(--surface2); }
  .search-wrap { flex: 1; max-width: 520px; display: flex; }
  .search-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-right: none; color: var(--text); padding: 0 16px; height: 38px; font-size: 13.5px; font-family: 'DM Sans', sans-serif; outline: none; border-radius: 20px 0 0 20px; transition: border-color 0.2s; }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { background: var(--surface3); }
  .search-btn { background: var(--surface3); border: 1px solid var(--border2); border-left: none; color: var(--text2); padding: 0 16px; cursor: pointer; border-radius: 0 20px 20px 0; transition: all 0.15s; height: 38px; display: flex; align-items: center; }
  .search-btn:hover { background: var(--surface2); color: var(--text); }
  .search-btn svg { width: 16px; height: 16px; }

  .main { margin-left: var(--sidebar-w); margin-top: 60px; padding: 28px; transition: margin-left 0.3s ease; min-height: calc(100vh - 60px); }
  .main.full { margin-left: 0; }

  .chips-bar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .chip { padding: 7px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); transition: all 0.15s; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
  .chip:hover { background: var(--surface3); color: var(--text); }
  .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .section-header h2 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .video-card { cursor: pointer; border-radius: 12px; overflow: hidden; background: var(--surface); border: 1px solid var(--border); transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; animation: fadeUp 0.4s ease both; }
  .video-card:hover { transform: translateY(-3px); border-color: var(--border2); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .thumb-wrap { position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--surface2); }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
  .video-card:hover .thumb-wrap img { transform: scale(1.04); }
  .duration-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.85); color: white; font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 5px; }
  .card-body { padding: 12px 14px 14px; }
  .card-title { font-size: 13.5px; font-weight: 500; line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-channel { color: var(--text2); font-size: 12.5px; }
  .card-stats { color: var(--text3); font-size: 12px; margin-top: 2px; }

  .player-page { display: none; }
  .player-page.active { display: block; }
  .home-page.hidden { display: none; }

  .player-layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
  .player-wrap { position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; }
  .player-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
  .player-info { margin-top: 16px; }
  .player-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; }
  .player-meta { display: flex; align-items: center; gap: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .player-channel { font-size: 14px; font-weight: 500; color: var(--text2); }
  .player-views { font-size: 13px; color: var(--text3); }
  .player-desc { margin-top: 14px; font-size: 13.5px; color: var(--text2); line-height: 1.6; max-height: 80px; overflow: hidden; }
  .player-desc.expanded { max-height: none; }
  .desc-toggle { margin-top: 8px; font-size: 13px; color: var(--accent); cursor: pointer; display: inline-block; }

  .related-header { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .related-list { display: flex; flex-direction: column; gap: 10px; }
  .related-card { display: flex; gap: 10px; cursor: pointer; padding: 8px; border-radius: 10px; transition: background 0.15s; }
  .related-card:hover { background: var(--surface2); }
  .related-thumb { width: 120px; flex-shrink: 0; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: var(--surface2); }
  .related-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .related-info { flex: 1; min-width: 0; }
  .related-title-text { font-size: 12.5px; font-weight: 500; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
  .related-channel { font-size: 11.5px; color: var(--text3); }

  .back-btn { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; cursor: pointer; color: var(--text2); font-size: 13.5px; padding: 8px 14px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); transition: all 0.15s; }
  .back-btn:hover { color: var(--text); border-color: var(--border2); }

  .loading { display: flex; justify-content: center; align-items: center; padding: 60px; flex-direction: column; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text3); font-size: 13.5px; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty p { font-size: 15px; margin-top: 12px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface3); border: 1px solid var(--border2); color: var(--text); padding: 12px 20px; border-radius: 10px; font-size: 13.5px; z-index: 999; display: none; max-width: 420px; text-align: center; }
  .toast.show { display: block; animation: fadeUp 0.3s ease; }

  @media (max-width: 960px) { .player-layout { grid-template-columns: 1fr; } }
  @media (max-width: 640px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .topbar { left: 0 !important; }
    .main { margin-left: 0 !important; padding: 16px; }
    .video-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    <div class="logo-name">Jay<span>Tube</span></div>
  </div>
  <div class="nav-section">
    <div class="nav-item active" id="homeNavItem" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Home
    </div>
    <div class="nav-item" onclick="loadVideos('trending videos 2025','Trending')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
      Trending
    </div>
  </div>
  <div class="categories-nav">
    <div class="cat-title">Categories</div>
    <div id="sidebarCats"></div>
  </div>
</aside>

<header class="topbar" id="topbar">
  <button class="menu-btn" onclick="toggleSidebar()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="Search videos..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" onclick="doSearch()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
  </div>
</header>

<main class="main" id="main">
  <div class="home-page" id="homePage">
    <div class="chips-bar" id="chipsBar"></div>
    <div class="section-header">
      <div class="dot"></div>
      <h2 id="sectionTitle">Trending Videos</h2>
    </div>
    <div id="videoGrid" class="video-grid"></div>
  </div>

  <div class="player-page" id="playerPage">
    <div class="back-btn" onclick="goHome()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Back to Home
    </div>
    <div class="player-layout">
      <div>
        <div class="player-wrap" id="playerWrap"></div>
        <div class="player-info">
          <div class="player-title" id="playerTitle"></div>
          <div class="player-meta">
            <div class="player-channel" id="playerChannel"></div>
            <div class="player-views" id="playerViews"></div>
          </div>
          <div class="player-desc" id="playerDesc"></div>
          <span class="desc-toggle" id="descToggle" onclick="toggleDesc()">Show more</span>
        </div>
      </div>
      <div>
        <div class="related-header">Up Next</div>
        <div class="related-list" id="relatedList"></div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const API_KEY = 'AIzaSyCJWlkaqmW63PJYhw29Hj6gxrlZGotyxIM';
const BASE = 'https://www.googleapis.com/youtube/v3';

const CATS = [
  { label: 'All',      q: 'trending 2025' },
  { label: 'Music',    q: 'music hits 2025' },
  { label: 'Gaming',   q: 'gaming 2025' },
  { label: 'Sports',   q: 'sports highlights 2025' },
  { label: 'Tech',     q: 'technology review 2025' },
  { label: 'News',     q: 'world news today 2025' },
  { label: 'Comedy',   q: 'funny comedy 2025' },
  { label: 'Cooking',  q: 'cooking recipes 2025' },
  { label: 'Cars',     q: 'cars review 2025' },
  { label: 'Science',  q: 'science discoveries 2025' },
];

let sidebarOpen = true;
let activeCat = 0;

function init() {
  // chips
  const bar = document.getElementById('chipsBar');
  bar.innerHTML = CATS.map((c,i) =>
    `<div class="chip${i===0?' active':''}" onclick="selectCat(${i})">${c.label}</div>`
  ).join('');
  // sidebar cats
  const sc = document.getElementById('sidebarCats');
  sc.innerHTML = CATS.map((c,i) =>
    `<button class="cat-btn${i===0?' active':''}" onclick="selectCat(${i})">${c.label}</button>`
  ).join('');

  loadVideos(CATS[0].q, 'Trending Videos');
}

function selectCat(i) {
  activeCat = i;
  document.querySelectorAll('.chip').forEach((c,j) => c.classList.toggle('active', i===j));
  document.querySelectorAll('.cat-btn').forEach((c,j) => c.classList.toggle('active', i===j));
  loadVideos(CATS[i].q, CATS[i].label === 'All' ? 'Trending Videos' : CATS[i].label);
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.cat-btn').forEach(c => c.classList.remove('active'));
  loadVideos(q, `Results for "${q}"`);
}

async function loadVideos(query, title) {
  showHomePage();
  document.getElementById('sectionTitle').textContent = title;
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = `<div class="loading" style="grid-column:1/-1"><div class="spinner"></div><div class="loading-text">Loading...</div></div>`;

  try {
    const r = await fetch(`${BASE}/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=20&key=${API_KEY}`);
    const d = await r.json();
    if (d.error) { showToast('API Error: ' + d.error.message); grid.innerHTML = emptyHTML(); return; }
    if (!d.items?.length) { grid.innerHTML = emptyHTML(); return; }

    const ids = d.items.map(v => v.id.videoId).join(',');
    const r2 = await fetch(`${BASE}/videos?part=snippet,statistics,contentDetails&id=${ids}&key=${API_KEY}`);
    const d2 = await r2.json();
    const items = d2.items?.length ? d2.items : d.items;

    grid.innerHTML = '';
    items.forEach((v, i) => grid.appendChild(buildCard(v, i)));
  } catch(e) {
    showToast('Network error — check your internet connection.');
    grid.innerHTML = emptyHTML();
  }
}

function buildCard(v, i) {
  const s = v.snippet;
  const stats = v.statistics || {};
  const dur = v.contentDetails ? fmtDur(v.contentDetails.duration) : '';
  const views = stats.viewCount ? fmtNum(stats.viewCount) + ' views' : '';
  const thumb = s.thumbnails?.high?.url || s.thumbnails?.medium?.url || '';
  const vid = v.id?.videoId || v.id;

  const el = document.createElement('div');
  el.className = 'video-card';
  el.style.animationDelay = (i * 0.04) + 's';
  el.innerHTML = `
    <div class="thumb-wrap">
      <img src="${thumb}" alt="" loading="lazy">
      ${dur ? `<div class="duration-badge">${dur}</div>` : ''}
    </div>
    <div class="card-body">
      <div class="card-title">${esc(s.title)}</div>
      <div class="card-channel">${esc(s.channelTitle)}</div>
      <div class="card-stats">${[views, timeAgo(s.publishedAt)].filter(Boolean).join(' · ')}</div>
    </div>`;
  el.onclick = () => openPlayer(vid, s.title, s.channelTitle, views, s.description || '');
  return el;
}

function openPlayer(vid, title, channel, views, desc) {
  document.getElementById('playerWrap').innerHTML =
    `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1&rel=0&modestbranding=1"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  document.getElementById('playerTitle').textContent = title;
  document.getElementById('playerChannel').textContent = channel;
  document.getElementById('playerViews').textContent = views;
  const de = document.getElementById('playerDesc');
  de.textContent = desc || 'No description available.';
  de.classList.remove('expanded');
  document.getElementById('descToggle').textContent = 'Show more';
  loadRelated(title);
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('playerPage').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function loadRelated(query) {
  const list = document.getElementById('relatedList');
  list.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  try {
    const r = await fetch(`${BASE}/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=10&key=${API_KEY}`);
    const d = await r.json();
    if (!d.items?.length) { list.innerHTML = ''; return; }
    list.innerHTML = d.items.map(v => {
      const s = v.snippet;
      const thumb = s.thumbnails?.medium?.url || s.thumbnails?.default?.url || '';
      const vid = v.id.videoId;
      return `<div class="related-card" onclick="openPlayer('${vid}',${JSON.stringify(s.title)},${JSON.stringify(s.channelTitle)},'',${JSON.stringify(s.description||'')})">
        <div class="related-thumb"><img src="${thumb}" alt="" loading="lazy"></div>
        <div class="related-info">
          <div class="related-title-text">${esc(s.title)}</div>
          <div class="related-channel">${esc(s.channelTitle)}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) { list.innerHTML = ''; }
}

function goHome() {
  showHomePage();
  document.getElementById('playerWrap').innerHTML = '';
}
function showHomePage() {
  document.getElementById('homePage').classList.remove('hidden');
  document.getElementById('playerPage').classList.remove('active');
}
function toggleDesc() {
  const d = document.getElementById('playerDesc');
  const t = document.getElementById('descToggle');
  d.classList.toggle('expanded');
  t.textContent = d.classList.contains('expanded') ? 'Show less' : 'Show more';
}
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('hidden', !sidebarOpen);
  document.getElementById('main').classList.toggle('full', !sidebarOpen);
  document.getElementById('topbar').classList.toggle('full', !sidebarOpen);
}
function fmtDur(iso) {
  if (!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = +( m[1]||0), mi = +(m[2]||0), s = +(m[3]||0);
  if (h) return `${h}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${mi}:${String(s).padStart(2,'0')}`;
}
function fmtNum(n) {
  n = +n;
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return String(n);
}
function timeAgo(d) {
  if (!d) return '';
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 3600) return Math.floor(s/60)+'m ago';
  if (s < 86400) return Math.floor(s/3600)+'h ago';
  if (s < 2592000) return Math.floor(s/86400)+'d ago';
  if (s < 31536000) return Math.floor(s/2592000)+'mo ago';
  return Math.floor(s/31536000)+'y ago';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function emptyHTML() {
  return `<div class="empty" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48" style="opacity:0.2"><path d="M18 3v2h-2V3H8v2H6V3H4v18h2v-2h2v2h8v-2h2v2h2V3h-2z"/></svg><p>No videos found</p></div>`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

init();
</script>
</body>
</html>
